<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="EduConnect" />
  <title>EduConnect</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { margin: 0; padding: 0; overscroll-behavior: none; }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-in { animation: slide-in 0.25s ease; }
    #install-banner {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #4f46e5; color: white; padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 9999; font-family: sans-serif; font-size: 14px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
    }
    #install-banner.hidden { display: none; }
    #install-banner button {
      background: white; color: #4f46e5; border: none;
      padding: 8px 16px; border-radius: 8px; font-weight: bold;
      cursor: pointer; font-size: 13px;
    }
    #install-banner .close-btn {
      background: transparent; color: white; border: none;
      margin-left: 8px; padding: 4px 8px; font-size: 18px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <div id="install-banner" class="hidden">
    <span>📱 Install EduConnect App!</span>
    <div style="display:flex;gap:8px;align-items:center">
      <button id="install-btn">Install</button>
      <button class="close-btn" id="close-banner">&#x2715;</button>
    </div>
  </div>

  <script>
    // PWA Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }

    // Install prompt
    let deferredPrompt = null;
    const banner = document.getElementById('install-banner');
    const installBtn = document.getElementById('install-btn');
    const closeBanner = document.getElementById('close-banner');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      setTimeout(() => { banner && banner.classList.remove('hidden'); }, 4000);
    });

    installBtn && installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      banner.classList.add('hidden');
    });

    closeBanner && closeBanner.addEventListener('click', () => {
      banner.classList.add('hidden');
    });

    window.addEventListener('appinstalled', () => {
      banner && banner.classList.add('hidden');
    });
  </script>
